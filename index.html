<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A-Z Speed Test</title>
<style>
body{
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#111;
    color:white;
    text-align:center;
}
.box{
    width:700px;
}
#letters{
    font-size:32px;
    letter-spacing:3px;
    margin:20px 0;
    word-wrap:break-word;
}
.current{
    color:#00ff66;
    text-decoration:underline;
}
.done{
    color:#666;
}
#result{
    font-size:24px;
    margin-top:20px;
}
    #mobileInput{
    width:320px;
    max-width:90%;
    padding:12px;
    font-size:24px;
    text-align:center;
    border-radius:8px;
    border:none;
    outline:none;
    margin-top:20px;
}
</style>
</head>
<body>

<div class="box">
<h1>A → Z Speed Test</h1>

<p>Press <b>A</b> to start. Type until <b>Z</b>.</p>
<p>Wrong keys count as mistakes.</p>

<div id="letters"></div>

<div id="result">
Time: 0.000 s<br>
Mistakes: 0
</div>
<input
    type="text"
    id="mobileInput"
    placeholder="Tap here then type A → Z"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="none"
    spellcheck="false">

<p>Press Enter to restart.</p>

</div>

<script>
const alphabet="abcdefghijklmnopqrstuvwxyz".split("");

let index=0;
let started=false;
let startTime=0;
let mistakes=0;
const rightSound = new Audio("fahhhhh.mp3");
const wrongSound = new Audio("Ye Le Meme.mp3");
const finishSound = new Audio("screaming_chicken_loud.mp3");
const miracle = new Audio("akshay_kumar_miracle.mp3");
const letters=document.getElementById("letters");
const result=document.getElementById("result");
const mobileInput=document.getElementById("mobileInput");

window.addEventListener("load",()=>{
    mobileInput.focus();
});

document.body.addEventListener("click",()=>{
    mobileInput.focus();
});

document.body.addEventListener("touchstart",()=>{
    mobileInput.focus();
});
function render(){
    letters.innerHTML="";
    alphabet.forEach((c,i)=>{
        const span=document.createElement("span");
        span.textContent=c+" ";

        if(i<index) span.className="done";
        else if(i===index) span.className="current";

        letters.appendChild(span);
    });
}
function playSound(sound){
    sound.pause();
    sound.currentTime = 0;
    sound.play();
}
render();

mobileInput.addEventListener("keydown",(e)=>{

    const key=e.key.toLowerCase();

    if(key==="enter"){
        index=0;
        started=false;
        mistakes=0;
        result.innerHTML="Time: 0.000 s<br>Mistakes: 0";
        render();
        return;
    }

    if(key.length!==1 || key<'a' || key>'z') return;

    if(!started){
        if(key!=="a") return;
        started=true;
        startTime=performance.now();
    }

    if(key===alphabet[index]){
        if(index!=25){
            playSound(wrongSound);
        }
        index++;
        render();

        if(index===26){
            if(mistake==0){
                playSound(miracle);
            }else{
                playSound(finishSound);
            }
            const time=((performance.now()-startTime)/1000).toFixed(3);
            result.innerHTML=`🎉 Finished!<br>Time: <b>${time}</b> seconds<br>Mistakes: <b>${mistakes}</b>`;
            started=false;
        }

    }else{
        mistakes++;
        playSound(rightSound);
        result.innerHTML=`Mistakes: ${mistakes}`;
    }
    mobileInput.value="";
    mobileInput.focus();

});
</script>

</body>
</html>
