<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A-Z Speed Test</title>
<style>
body{
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
    background:#111;
    color:white;
    text-align:center;
}
.box{
    width:min(90vw,700px);
    padding:20px;
}
#letters{
    font-size:32px;
    letter-spacing:3px;
    margin:20px 0;
    word-wrap:break-word;
}
.current{
    color:#00ff66;
    text-decoration:underline;
}
.done{
    color:#666;
}
#keyInput{
    width:100%;
    padding:15px 12px;
    margin:16px 0 0;
    font-size:18px;
    border:none;
    border-radius:10px;
    outline:none;
    box-sizing:border-box;
}
#result{
    font-size:24px;
    margin-top:20px;
}
</style>
</head>
<body>

<div class="box">
<h1>A → Z Speed Test</h1>

<p>Press <b>A</b> to start. Type until <b>Z</b>.</p>
<p>Wrong keys count as mistakes.</p>

<div id="letters"></div>

<input id="keyInput" type="text" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="Tap here and type" autofocus />

<div id="result">
Time: 0.000 s<br>
Mistakes: 0
</div>

<p>Press Enter to restart.</p>

</div>

<script>
const alphabet="abcdefghijklmnopqrstuvwxyz".split("");
const keyInput = document.getElementById('keyInput');

let index=0;
let started=false;
let startTime=0;
let mistakes=0;
const rightSound = new Audio("fahhhhh.mp3");
const wrongSound = new Audio("Ye Le Meme.mp3");
const finishSound = new Audio("screaming_chicken_loud.mp3");
const letters=document.getElementById("letters");
const result=document.getElementById("result");

function render(){
    letters.innerHTML="";
    alphabet.forEach((c,i)=>{
        const span=document.createElement("span");
        span.textContent=c+" ";

        if(i<index) span.className="done";
        else if(i===index) span.className="current";

        letters.appendChild(span);
    });
}
function playSound(sound){
    sound.pause();
    sound.currentTime = 0;
    sound.play();
}

function resetGame(){
    index=0;
    started=false;
    mistakes=0;
    result.innerHTML="Time: 0.000 s<br>Mistakes: 0";
    render();
}

function focusInput(){
    keyInput.focus();
}

render();
focusInput();

keyInput.addEventListener('input', (e) => {
    const value = e.target.value.trim().toLowerCase();
    if (!value) return;
    const key = value[value.length - 1];
    e.target.value = '';
    handleKey(key);
});

keyInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        e.preventDefault();
        resetGame();
        focusInput();
    }
});

keyInput.addEventListener('keypress', () => {
    // keep the mobile keyboard open while the input is active
});

document.addEventListener('keydown', (e) => {
    if (e.target === keyInput) return;
    const key = e.key.toLowerCase();
    if (key === 'enter') {
        resetGame();
        focusInput();
        return;
    }
});

document.addEventListener('click', focusInput);

document.addEventListener('touchstart', focusInput, {passive: true});

function handleKey(key){

    if(key==="enter"){
        index=0;
        started=false;
        mistakes=0;
        result.innerHTML="Time: 0.000 s<br>Mistakes: 0";
        render();
        return;
    }

    if(key.length!==1 || key<'a' || key>'z') return;

    if(!started){
        if(key!=="a") return;
        started=true;
        startTime=performance.now();
    }

    if(key===alphabet[index]){
        if(index!=25){
            playSound(wrongSound);
        }
        index++;
        render();

        if(index===26){
            playSound(finishSound);
            const time=((performance.now()-startTime)/1000).toFixed(3);
            result.innerHTML=`🎉 Finished!<br>Time: <b>${time}</b> seconds<br>Mistakes: <b>${mistakes}</b>`;
            started=false;
        }

    }else{
        mistakes++;
        playSound(rightSound);
        result.innerHTML=`Mistakes: ${mistakes}`;
    }

});
</script>

</body>
</html>
