<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Gallery</title>
    <meta
      name="description"
      content="A polished GitHub Pages portfolio showcasing games, tools, and experiments."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="aurora aurora-one"></div>
    <div class="aurora aurora-two"></div>
    <div class="aurora aurora-three"></div>

    <div class="page-shell">
      <header class="hero">
        <div class="hero__copy">
          <p class="eyebrow">🚀 Meghraj's Lab</p>
          <h1>Games, tools, and experiments in one polished hub.</h1>
          <p class="hero__text">
            Browse interactive projects, launch apps instantly, and discover new
            experiments built for GitHub Pages.
          </p>
          <div class="hero__actions">
            <button class="action-btn action-btn--primary" id="random-btn">
              🎲 Surprise Me
            </button>
            <a class="action-btn action-btn--ghost" href="#gallery">Explore Gallery</a>
          </div>
        </div>
        <div class="hero__stats">
          <div class="stat-card">
            <strong id="project-count">0</strong>
            <span>Projects</span>
          </div>
          <div class="stat-card">
            <strong>∞</strong>
            <span>Creative ideas</span>
          </div>
          <div class="stat-card">
            <strong>100%</strong>
            <span>GitHub Pages ready</span>
          </div>
        </div>
      </header>
      
      <section class="toolbar" id="gallery">
        <label class="search-bar" for="search">
          <span>🔍</span>
          <input id="search" type="search" placeholder="Search apps..." />
        </label>
        <div class="filter-chips" id="filter-chips"></div>
      </section>

      <section class="gallery" id="gallery-grid" aria-label="Project gallery"></section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
